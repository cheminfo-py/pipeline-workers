services:
  xtb-optimization-worker:
    build:
      context: .
      dockerfile: xtb-optimization/Dockerfile
    restart: unless-stopped
    stop_grace_period: 3s
    read_only: true
    user: '65534:65534' # nobody/nogroup — run as non-root
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      replicas: ${XTB_OPT_REPLICAS:-1}
      resources:
        limits:
          memory: '${XTB_OPT_MEMORY:-4G}'
          cpus: '${XTB_OPT_CPUS:-1}'
          pids: 256
    logging:
      driver: json-file
      options:
        max-size: 200m
        max-file: '3'
    volumes:
      - /etc/hostname:/etc/host_hostname:ro
    tmpfs:
      - /tmp:size=500m,nosuid
    environment:
      - TOKEN=${TOKEN}
      - SERVER_URL=${SERVER_URL}
      - WORKER_HOSTNAME=${WORKER_HOSTNAME:-}
      - CPUS=${XTB_OPT_CPUS:-1}

  xtb-vibrational-worker:
    build:
      context: .
      dockerfile: xtb-vibrational/Dockerfile
    restart: unless-stopped
    stop_grace_period: 3s
    read_only: true
    user: '65534:65534'
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      replicas: ${XTB_VIB_REPLICAS:-1}
      resources:
        limits:
          memory: '${XTB_VIB_MEMORY:-4G}'
          cpus: '${XTB_VIB_CPUS:-1}'
          pids: 256
    logging:
      driver: json-file
      options:
        max-size: 200m
        max-file: '3'
    volumes:
      - /etc/hostname:/etc/host_hostname:ro
    tmpfs:
      - /tmp:size=500m,nosuid
    environment:
      - TOKEN=${TOKEN}
      - SERVER_URL=${SERVER_URL}
      - WORKER_HOSTNAME=${WORKER_HOSTNAME:-}
      - CPUS=${XTB_VIB_CPUS:-1}

  rdkit-conformers-worker:
    build:
      context: .
      dockerfile: rdkit-conformers/Dockerfile
    restart: unless-stopped
    stop_grace_period: 3s
    read_only: true
    user: '65534:65534'
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      replicas: ${RDKIT_CONFORMERS_REPLICAS:-1}
      resources:
        limits:
          memory: '${RDKIT_CONFORMERS_MEMORY:-2G}'
          cpus: '${RDKIT_CONFORMERS_CPUS:-1}'
          pids: 256
    logging:
      driver: json-file
      options:
        max-size: 200m
        max-file: '3'
    volumes:
      - /etc/hostname:/etc/host_hostname:ro
    tmpfs:
      - /tmp:size=100m,noexec,nosuid
    environment:
      - TOKEN=${TOKEN}
      - SERVER_URL=${SERVER_URL}
      - WORKER_HOSTNAME=${WORKER_HOSTNAME:-}
      - CPUS=${RDKIT_CONFORMERS_CPUS:-1}
