services:
  xtb-optimization-worker:
    build:
      context: .
      dockerfile: xtb-optimization/Dockerfile
    restart: unless-stopped
    stop_grace_period: 3s
    read_only: true
    user: '65534:65534' # nobody/nogroup — run as non-root
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${XTB_OPT_MEMORY:-4G}
          cpus: '${XTB_OPT_CPUS:-8}'
          pids: 256
    logging:
      driver: json-file
      options:
        max-size: 200m
        max-file: '3'
    tmpfs:
      - /tmp:size=500m,nosuid
    env_file:
      - .env

  xtb-vibrational-worker:
    build:
      context: .
      dockerfile: xtb-vibrational/Dockerfile
    restart: unless-stopped
    stop_grace_period: 3s
    read_only: true
    user: '65534:65534'
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${XTB_VIB_MEMORY:-4G}
          cpus: '${XTB_VIB_CPUS:-8}'
          pids: 256
    logging:
      driver: json-file
      options:
        max-size: 200m
        max-file: '3'
    tmpfs:
      - /tmp:size=500m,nosuid
    env_file:
      - .env

  rdkit-conformers-worker:
    build:
      context: .
      dockerfile: rdkit-conformers/Dockerfile
    restart: unless-stopped
    stop_grace_period: 3s
    read_only: true
    user: '65534:65534'
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${RDKIT_CONFORMERS_MEMORY:-2G}
          cpus: '${RDKIT_CONFORMERS_CPUS:-4}'
          pids: 256
    logging:
      driver: json-file
      options:
        max-size: 200m
        max-file: '3'
    tmpfs:
      - /tmp:size=100m,noexec,nosuid
    env_file:
      - .env
